fit_ml_model:
  name: Fit EMHASS ML Model
  description: Trains the EMHASS Machine Learning load forecaster using historical data. The model lag constraint is calculated automatically based on your maximum prediction horizon.
  fields:
    historic_days_to_retrieve:
      name: Days of History
      description: Number of historic days to retrieve from Home Assistant DB.
      required: false
      default: 30
      selector:
        number:
          min: 9
          max: 365
          mode: box
    sklearn_model:
      name: Scikit-Learn Model
      description: The base ML algorithm to train.
      required: false
      default: KNeighborsRegressor
      selector:
        select:
          options:
            - KNeighborsRegressor
            - RandomForestRegressor
            - GradientBoostingRegressor
            - RidgeRegression
            - MLPRegressor

tune_ml_model:
  name: Tune EMHASS ML Model
  description: Uses Bayesian optimization to test different internal parameters and lag counts to find the most accurate model for your home. This process is very slow.
  fields:
    historic_days_to_retrieve:
      name: Days of History
      description: Number of historic days to retrieve from Home Assistant DB.
      required: false
      default: 30
      selector:
        number:
          min: 9
          max: 365
          mode: box
    sklearn_model:
      name: Scikit-Learn Model
      description: The base ML algorithm to optimize.
      required: false
      default: KNeighborsRegressor
      selector:
        select:
          options:
            - KNeighborsRegressor
            - RandomForestRegressor
            - GradientBoostingRegressor
            - RidgeRegression
            - MLPRegressor
    n_trials:
      name: Optimization Trials
      description: How many different combinations to test. Higher numbers find better scores but take significantly longer.
      required: false
      default: 10
      selector:
        number:
          min: 5
          max: 100
          mode: slider

predict_ml_model:
  name: Predict EMHASS ML Model
  description: Triggers a prediction using the trained ML model and publishes it to a sensor.

run_mpc_optim:
  name: Run EMHASS MPC Optimization
  description: Executes the naive-mpc-optim endpoint natively by compiling Nordpool, Solcast, and EV states via Python.
